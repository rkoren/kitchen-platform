repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: no-raw-data
        name: no raw data in git
        language: system
        pass_filenames: false
        entry: >-
          bash -c
          'FILES=$(git ls-files "data/raw/" | grep -v "\.gitkeep" || true);
          if [ -n "$FILES" ]; then
          echo "Raw data files staged — remove with: git rm --cached <file>";
          echo "$FILES"; exit 1; fi'
