# Example: a persistent MLflow tracking backend so registry champions survive
# across runs (see docs/decisions/mlflow-tracking-backend.md).
#
# Three pieces:
#   - security_group: the inbound rule (Postgres 5432) that makes the RDS reachable.
#     The default CIDR is 0.0.0.0/0 so GitHub-hosted CI runners (dynamic IPs) and your
#     local machine can connect — rely on TLS + the RDS-managed password, or narrow
#     `cidr_blocks` to known ranges. For a private backend, drop public access and put
#     a tracking server in front instead (the decision doc's upgrade path).
#   - rds: the Postgres BACKEND STORE (experiments, runs, registry + champion alias).
#     The master password is created and rotated by RDS in AWS Secrets Manager — never
#     written to Terraform config or state. Wire the generated
#     `mlflow_backend_master_user_secret_arn` output into a project's `secrets:` manifest
#     and point MLFLOW_TRACKING_URI at the `..._endpoint` output.
#   - s3: the ARTIFACT STORE (the model files the champion points to). Set
#     `mlflow.artifact_bucket` to this bucket so artifacts are durable too — otherwise
#     a champion row persists but its model can't load elsewhere.
#
# Uses the account's default VPC (no `vpc_id` / `db_subnet_group_name`). For a custom
# VPC, set `vpc_id` on the security_group and `db_subnet_group_name` on the rds.
#
# Deploy:
#   recipes apply mlflow-tracking-backend.yaml --state-bucket <your-tf-state-bucket>
name: mlflow-tracking-backend
region: us-east-1

resources:
  - type: security_group
    name: mlflow-backend-sg
    description: Postgres access to the MLflow backend store

  - type: rds
    name: mlflow-backend
    engine_version: "16"
    instance_class: db.t4g.micro
    allocated_storage: 20
    db_name: mlflow
    username: mlflow
    deletion_protection: true
    publicly_accessible: true
    security_groups: [mlflow-backend-sg]

  - type: s3
    name: my-project-mlflow-artifacts
    versioning: true
