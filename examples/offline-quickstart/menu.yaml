# Unified manifest (menu.yaml) — the offline quickstart as one file (INT-007/008).
#
# This is the smallest honest end-to-end menu: no infra recipes (local SQLite, zero
# credentials), so there is no `provision` step. The `pipeline` runs the project's stages
# in order; `train` runs features internally and promotes a champion, then `evaluate`
# scores that champion. Run the whole thing with `kitchen menu run`.

project: offline-quickstart   # experiment defaults to this

# The ordered run sequence. `train` runs the features step internally, so it isn't listed
# separately; `evaluate` loads the champion `train --auto-promote` registers.
pipeline: [train, evaluate]

# Each unit and where its code lives. All three stages are declared (honest `source`),
# even though only train/evaluate are in the pipeline.
recipes:
  features:
    kind: stage
    source: src/features/run.py
  train:
    kind: stage
    source: src/train/run.py
    args: ["--auto-promote"]   # register/compare a champion each run
  evaluate:
    kind: stage
    source: src/evaluate/run.py

# --- ML settings (same as the former params.yaml) ---

data:
  source: local          # bundled CSV in data/raw — no Kaggle, no network
  path: data/raw         # where the raw data already lives (no ingest needed)
  raw_file: train.csv

features:
  raw_file: train.csv
  processed_file: features.parquet

model:
  target: passed
  test_size: 0.2
  random_state: 42

mlflow:
  tracking_uri: sqlite:///mlruns.db   # local file store, created on first run

run_name: baseline
metrics_file: metrics.json

# Primary metric for the leaderboard + --auto-promote (plain float = higher-is-better lower bound).
thresholds:
  val_accuracy: 0.70
