# Unified manifest (menu.yaml) — the Spaceship Titanic showcase as one file.
#
# The whole project in a single manifest: no infra recipes (local SQLite), so
# there's no `provision` step. Fetch the data once with `kitchen ingest`, then
# `kitchen menu run` executes the `pipeline` in order — `train` runs features
# internally and promotes a champion, then `evaluate` scores that champion.

project: spaceship-titanic   # experiment defaults to this

pipeline: [train, evaluate]

recipes:
  features:
    kind: stage
    source: src/features/run.py
  train:
    kind: stage
    source: src/train/run.py
    args: ["--auto-promote"]   # register/compare a champion each run
  evaluate:
    kind: stage
    source: src/evaluate/run.py

# --- ML settings ---

data:
  source: kaggle              # `kitchen ingest` pulls the real files into data/raw (needs creds)
  competition: spaceship-titanic
  raw_file: train.csv

features:
  raw_file: train.csv
  test_file: test.csv               # the competition's held-out set (for flows/generate_submission.py)
  processed_file: features.parquet

model:
  target: Transported
  test_size: 0.2
  random_state: 42
  # XGBoost knobs (read by src/train/run.py) — override at the CLI:
  #   kitchen run train --override model.max_depth=6
  n_estimators: 400
  max_depth: 4
  eta: 0.05
  subsample: 0.9
  colsample_bytree: 0.8

mlflow:
  tracking_uri: sqlite:///mlruns.db   # local file store, created on first run

run_name: baseline-xgb
metrics_file: metrics.json

# Primary metric for the leaderboard + --auto-promote (plain float = higher-is-better lower bound).
thresholds:
  val_accuracy: 0.78

# --- Kaggle submission ---
# `flows/generate_submission.py` writes submissions/submission.csv from the champion;
# `kitchen submit` validates it against sample_submission.csv and (with credentials) uploads.
submission:
  competition: spaceship-titanic   # Getting Started sandbox — unlimited submissions, no stakes
  id_col: PassengerId
  target_col: Transported
  sample_submission: sample_submission.csv
  message: "kitchen showcase — tuned XGBoost baseline"
