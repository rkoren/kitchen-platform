name: publish

# Publish rkoren-kitchen to TestPyPI. (INT-013 merged recipes into kitchen — single dist.)
#
# Setup required (one-time):
#   1. Go to https://test.pypi.org and create a project named rkoren-kitchen.
#   2. Under the project's Publishing settings, add a Trusted Publisher:
#        Owner: rkoren  Repo: kitchen-platform  Workflow: publish.yml
#   3. Create a GitHub environment named "testpypi" (repo Settings → Environments).
#      No secrets needed — OIDC handles auth.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build kitchen
        run: python -m build kitchen/ --outdir dist/

      - name: Validate distributions
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
