name: kitchen-ci

on:
  push:
    branches: [main]
    paths:
      - "kitchen/**"
      - "recipes/**"
      - ".github/workflows/kitchen-ci.yml"
  pull_request:
    paths:
      - "kitchen/**"
      - "recipes/**"
      - ".github/workflows/kitchen-ci.yml"
  workflow_dispatch:
    inputs:
      bootstrap_deploy:
        description: "First-time bootstrap (allows partial Terraform apply before ECR image exists)"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: kitchen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --cov=kitchen

  # S-008: build the framework serving image on every push/PR (no AWS). Catches
  # dependency drift, a broken COPY context, and base-image deprecation before a
  # deploy. (Container start + /health smoke check is a follow-up — see backlog.)
  serving-image-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build serving image
        run: docker build -f kitchen/kitchen/serve/Dockerfile kitchen/

  docker-build:
    runs-on: ubuntu-latest
    needs: infra-apply
    if: github.ref == 'refs/heads/main'
    environment: production # SEC-008: gate production deploys behind a protected environment

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push serving image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/kitchen-serve:latest \
            -f kitchen/kitchen/serve/Dockerfile kitchen
          docker push $ECR_REGISTRY/kitchen-serve:latest

  infra-plan:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install recipes
        run: pip install -e recipes/

      - name: Generate Terraform
        run: recipes generate kitchen/infra.yaml --out kitchen/tf

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Terraform Init
        working-directory: kitchen/tf
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=kitchen/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Plan
        working-directory: kitchen/tf
        run: terraform plan

  infra-apply:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production # SEC-008: gate production deploys behind a protected environment

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install recipes
        run: pip install -e recipes/

      - name: Generate Terraform
        run: recipes generate kitchen/infra.yaml --out kitchen/tf

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Terraform Init
        working-directory: kitchen/tf
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=kitchen/terraform.tfstate" \
            -backend-config="region=us-east-1"

      # Lambda requires an image to exist in ECR at creation time.
      # On first bootstrap the image doesn't exist yet; docker-build pushes it
      # and lambda-deploy completes the apply. This job uses workflow_dispatch
      # only — set BOOTSTRAP_DEPLOY=true in dispatch inputs for first deploy.
      - name: Terraform Apply
        working-directory: kitchen/tf
        run: terraform apply -auto-approve
        continue-on-error: ${{ github.event.inputs.bootstrap_deploy == 'true' }}

  lambda-deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production # SEC-008: gate production deploys behind a protected environment

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install recipes
        run: pip install -e recipes/

      - name: Generate Terraform
        run: recipes generate kitchen/infra.yaml --out kitchen/tf

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          audience: sts.amazonaws.com

      - name: Terraform Init
        working-directory: kitchen/tf
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=kitchen/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Terraform Apply
        working-directory: kitchen/tf
        run: terraform apply -auto-approve
