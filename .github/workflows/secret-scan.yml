name: secret-scan

# SEC-009: scan the repository for committed secrets (AWS keys, tokens, private keys)
# on every push and PR, as a backstop to the local gitleaks pre-commit hook.
# Free for public repositories; no GITLEAKS_LICENSE needed.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers all commits, not just the tip

      - uses: gitleaks/gitleaks-action@v2
